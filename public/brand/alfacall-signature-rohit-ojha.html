<!--
  AlfaCall — Outlook Email Signature for Rohit Ojha
  ============================================================
  HOW TO INSTALL (Outlook Desktop / Windows):
    1. Open Outlook → File → Options → Mail → Signatures…
    2. Click "New", name it "AlfaCall".
    3. Open this file in a browser, select ALL (Ctrl+A), copy (Ctrl+C),
       then paste (Ctrl+V) into the signature edit box.
    4. Set it as the default for New messages / Replies. Click OK.

  HOW TO INSTALL (Outlook on the web / Microsoft 365):
    1. Settings (gear) → Mail → Compose and reply → Email signature.
    2. Open this file in a browser, select all, copy, and paste it in.
    3. Save.

  HOW TO INSTALL (Apple Mail):
    1. Mail → Settings → Signatures → create a new signature.
    2. Paste the copied content. If formatting is lost, uncheck
       "Always match my default message font".

  NOTE ON THE LOGO:
    The animated GIF is referenced from a hosted URL so it animates in
    clients that support it (Outlook web, Apple Mail, Gmail). Outlook for
    Windows shows the first frame only — that is expected behaviour and the
    logo still looks correct. Update LOGO_URL below if your domain changes.
  ============================================================
-->
